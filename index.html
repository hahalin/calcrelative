<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>親等計算器 - 民法親等關係查詢</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>親等計算器</h1>
      <p class="subtitle">輸入親屬稱謂，計算民法親等並呈現關係圖</p>
    </header>

    <main class="main">
      <!-- 輸入區 -->
      <section class="input-section">
        <div class="search-box">
          <label for="kinship-input">親屬稱謂</label>
          <div class="input-wrapper">
            <input
              type="text"
              id="kinship-input"
              placeholder="例如：堂伯父、表舅、姑姑..."
              autocomplete="off"
            >
            <button id="calc-btn" type="button">查詢</button>
          </div>
          <ul id="suggestions" class="suggestions hidden"></ul>
        </div>
      </section>

      <!-- 結果區 -->
      <section id="result-section" class="result-section hidden">
        <!-- 結果卡片 -->
        <div class="result-card">
          <div class="result-header">
            <span id="result-term" class="result-term"></span>
            <span id="result-degree" class="result-degree"></span>
          </div>
          <div class="result-detail" style="display: none;">
            <div class="detail-row">
              <span class="detail-label">關係類型</span>
              <span id="result-type" class="detail-value"></span>
            </div>
            <div class="detail-row">
              <span class="detail-label">計算方式</span>
              <span id="result-calc" class="detail-value"></span>
            </div>
            <div class="detail-row">
              <span class="detail-label">法律依據</span>
              <span id="result-law" class="detail-value"></span>
            </div>
          </div>
        </div>

        <!-- Mermaid 圖表 -->
        <div class="chart-card">
          <h2 class="chart-title">關係路徑圖</h2>
          <div id="mermaid-container" class="mermaid-container"></div>
        </div>
      </section>

      <!-- 常見稱謂快速選擇 -->
      <section class="quick-section" style="display: none;">
        <h2>常見稱謂</h2>
        <div class="tag-groups">
          <div class="tag-group">
            <h3>直系血親</h3>
            <div class="tags" id="tags-direct"></div>
          </div>
          <div class="tag-group">
            <h3>旁系血親</h3>
            <div class="tags" id="tags-collateral"></div>
          </div>
          <div class="tag-group">
            <h3>姻親</h3>
            <div class="tags" id="tags-inlaw"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>依據中華民國民法第967-971條 ｜ 僅供參考，如有法律問題請諮詢專業人士</p>
    </footer>
  </div>

  <script src="kinship-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
